<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="container">
        <h1 class="heading">Feedback UI</h1>
        <div class="ratings-container" id="rating-container">
            <div class="rating">
                <img src="https://media.istockphoto.com/id/1342014125/photo/sad-pensive-smiley-face.jpg?s=2048x2048&w=is&k=20&c=huzwFGbpo3oIcFK9_o5mfOwvALBPMgIVDkdlGrcruxw=" alt=""><small>Unhappy</small>
            </div>
            <div class="rating">
                    <img src="https://media.istockphoto.com/id/982834492/photo/people-with-emoticon.jpg?s=2048x2048&w=is&k=20&c=gcqB8z4x0OfhzjFwVsjfLuzSEqPdXf2GRRijyP-Mxqk=" alt=""><small>Neutral</small>
                </div>

            <div class="rating">
                        <img src="https://cdn.pixabay.com/photo/2022/02/14/22/44/emoji-7014034_1280.png" alt=""><small>Satisfied</small>
                    </div>
            
            
            
        </div>
        <button class="btn" id="btn">Send Review</button>

    </div>
    </div>
<script src="script.js"></script>
</body>
</html>
